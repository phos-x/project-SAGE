# 1. THE FIX: Override the global Terraform entrypoint so it works in GitLab CI
image: 
  name: hashicorp/terraform:latest
  entrypoint: [""]

stages:
  - test          # Python Unit Tests
  - security      # Trivy CVE Scans
  - validate      # Terraform Validate & CFN Lint
  - plan          # Terraform Plan
  - apply         # Terraform Apply & CFN Deploy

variables:
  TF_STATE_NAME: default
  TF_CACHE_DIR: "$CI_PROJECT_DIR/.terraform"
  DATA_STACK_NAME: project-sage-data-platform
  ENVIRONMENT: dev
  ALERT_EMAIL: "data-team@yourcompany.com"

cache:
  key: default
  paths:
    - .terraform

python_unit_tests:
  stage: test
  image: python:3.14-slim  
  script:
    - pip install boto3 joblib scikit-learn pytest
    - pytest "$CI_PROJECT_DIR/tests/test_app.py"

infrastructure_security_scan:
  stage: security
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs . --severity MEDIUM,HIGH,CRITICAL --exit-code 1 --no-progress

.terraform:
  before_script:
    - terraform init -reconfigure
      -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}" 
      -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" 
      -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" 
      -backend-config="username=gitlab-ci-token" 
      -backend-config="password=${CI_JOB_TOKEN}" 
      -backend-config="lock_method=POST" 
      -backend-config="unlock_method=DELETE" 
      -backend-config="retry_wait_min=5"

terraform_validate:
  extends: .terraform
  stage: validate
  script:
    - terraform fmt -check
    - terraform validate

cloudformation_lint:
  stage: validate
  image: python:3.14-slim
  script:
    - pip install cfn-lint
    - cfn-lint platform.yaml

terraform_plan:
  extends: .terraform
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 hour

terraform_apply:
  extends: .terraform
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cloudformation_deploy:
  stage: apply
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    - |
      echo "🚀 Starting CloudFormation Deployment..."
      aws cloudformation delete-stack --stack-name $DATA_STACK_NAME
      if ! aws cloudformation deploy --template-file platform.yaml --stack-name $DATA_STACK_NAME --parameter-overrides Environment=$ENVIRONMENT AlertEmail=$ALERT_EMAIL --capabilities CAPABILITY_NAMED_IAM; then
        echo "❌ Deployment Failed! Fetching error details from AWS..."
        aws cloudformation describe-stack-events \
          --stack-name $DATA_STACK_NAME \
          --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId, ResourceStatusReason]' \
          --output table
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

