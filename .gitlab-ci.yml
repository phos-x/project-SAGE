# 1. THE FIX: Override the global Terraform entrypoint so it works in GitLab CI
image: 
  name: hashicorp/terraform:latest
  entrypoint: [""]

stages:
  - test          # Python Unit Tests
  - security      # Trivy CVE Scans
  - validate      # Terraform Validate & CFN Lint
  - plan          # Terraform Plan
  - apply         # Terraform Apply & CFN Deploy

variables:
  TF_STATE_NAME: default
  TF_CACHE_DIR: "$CI_PROJECT_DIR/.terraform"
  DATA_STACK_NAME: project-sage-data-platform
  ENVIRONMENT: dev
  ALERT_EMAIL: "adetayoadebayo67@gmail.com"

cache:
  key: default
  paths:
    - .terraform

python_unit_tests:
  stage: test
  image: python:3.14-slim  
  script:
    - pip install boto3 joblib scikit-learn pytest
    - pytest "$CI_PROJECT_DIR/tests/test_app.py"

infrastructure_security_scan:
  stage: security
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs . --severity MEDIUM,HIGH,CRITICAL --exit-code 1 --no-progress

.terraform:
  image: registry.gitlab.com/gitlab-org/terraform-images/releases/1.5:v1.0.0
  variables:
    TF_ROOT: ${CI_PROJECT_DIR}
    TF_STATE_NAME: default
  cache:
    key: ${TF_STATE_NAME}
    paths:
      - ${TF_ROOT}/.terraform

terraform_validate:
  extends: .terraform
  stage: validate
  script:
    - gitlab-terraform init
    - gitlab-terraform validate
    - gitlab-terraform fmt

cloudformation_lint:
  stage: validate
  image: python:3.14-slim
  script:
    - pip install cfn-lint
    - cfn-lint platform.yaml

terraform_plan:
  extends: .terraform
  stage: plan
  script:
    - gitlab-terraform init
    - gitlab-terraform plan
    - gitlab-terraform plan-json
  artifacts:
    name: plan
    paths:
      - ${TF_ROOT}/plan.cache
    reports:
      terraform: ${TF_ROOT}/plan.json

terraform_apply:
  extends: .terraform_base
  stage: apply
  script:
    - gitlab-terraform init
    - gitlab-terraform apply
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cloudformation_deploy:
  stage: apply
  image: 
    name: amazon/aws-cli:latest
    entrypoint: [""]
  script:
    - |
      echo "🔍 Inspecting AWS for existing stack state..."
      
      STACK_STATUS=$(aws cloudformation describe-stacks --stack-name $DATA_STACK_NAME --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
      echo "Current Stack Status $STACK_STATUS"

      if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
        echo "⚠️ Detected ROLLBACK_COMPLETE. Automatically deleting dead stack..."
        aws cloudformation delete-stack --stack-name $DATA_STACK_NAME
        aws cloudformation wait stack-delete-complete --stack-name $DATA_STACK_NAME
        echo "✅ Dead stack successfully purged."
      fi

      echo "🚀 Starting CloudFormation Deployment..."
      if ! aws cloudformation deploy \
        --template-file platform.yaml \
        --stack-name $DATA_STACK_NAME \
        --parameter-overrides Environment=$ENVIRONMENT AlertEmail=$ALERT_EMAIL \
        --capabilities CAPABILITY_NAMED_IAM \
        --no-fail-on-empty-changeset; then
        
        echo "❌ Deployment Failed!"
        
        if aws cloudformation describe-stacks --stack-name $DATA_STACK_NAME >/dev/null 2>&1; then
          echo "Fetching AWS failure events:"
          aws cloudformation describe-stack-events \
            --stack-name $DATA_STACK_NAME \
            --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId, ResourceStatusReason]' \
            --output table
        else
          echo "AWS rejected the deployment before creating the stack (Likely a template syntax or IAM permission error)."
        fi
        exit 1
      fi

  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

