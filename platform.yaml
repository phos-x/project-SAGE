AWSTemplateFormatVersion: '2010-09-09'
Description: 'Project SAGE: Event-Driven Data Platform Foundation with Observability'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: The deployment environment.
  AlertEmail:
    Type: String
    Description: Email address for critical pipeline alerts.

Resources:
  # ==========================================
  # 1. STORAGE LAYER (S3)
  # ==========================================
  RawDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sage-${Environment}-raw-data-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CuratedDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sage-${Environment}-curated-data-${AWS::AccountId}'

  # ==========================================
  # 2. OBSERVABILITY LAYER (SNS, SQS, CloudWatch)
  # ==========================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'sage-${Environment}-alerts'

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref AlertEmail
      Protocol: email
      TopicArn: !Ref AlertTopic

  IngestionDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'sage-${Environment}-ingestion-dlq'
      MessageRetentionPeriod: 1209600 # 14 days to replay failed events

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sage-${Environment}-ingestion-errors'
      AlarmDescription: "Triggers if Ingestion Lambda fails multiple times"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref IngestionLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

  # ==========================================
  # 3. COMPUTE & INGESTION (IAM, Lambda, EventBridge)
  # ==========================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AndSQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:PutObject']
                Resource: !Sub '${RawDataBucket.Arn}/*'
              - Effect: Allow
                Action: ['sqs:SendMessage']
                Resource: !GetAtt IngestionDLQ.Arn

  IngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sage-${Environment}-ingestor'
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Environment:
        Variables:
          RAW_BUCKET: !Ref RawDataBucket
      DeadLetterConfig:
        TargetArn: !GetAtt IngestionDLQ.Arn # Send failures to the DLQ
      Code:
        ZipFile: |
          import json, boto3, os, uuid
          s3 = boto3.client('s3')
          def lambda_handler(event, context):
              bucket = os.environ['RAW_BUCKET']
              key = f"events/{uuid.uuid4()}.json"
              print(f"Ingesting event to {bucket}/{key}")
              s3.put_object(Bucket=bucket, Key=key, Body=json.dumps(event))
              return {"status": "success"}

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Simulates incoming e-commerce traffic every 5 minutes"
      ScheduleExpression: "rate(5 minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt IngestionLambda.Arn
          Id: "IngestionTarget"

  # ==========================================
  # 4. ORCHESTRATION (Step Functions)
  # ==========================================
  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: states.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sns:Publish'
                Resource: !Ref AlertTopic

  DataPipelineStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub 'sage-${Environment}-orchestrator'
      RoleArn: !GetAtt StateMachineRole.Arn
      DefinitionString: !Sub |
        {
          "Comment": "Data Pipeline with Catch/Retry Logic",
          "StartAt": "SimulateGlueETL",
          "States": {
            "SimulateGlueETL": {
              "Type": "Pass",
              "Result": "Mock ETL Success",
              "Next": "SuccessState",
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "Next": "AlertOnFailure"
                }
              ]
            },
            "AlertOnFailure": {
              "Type": "Task",
              "Resource": "arn:aws:states:::sns:publish",
              "Parameters": {
                "TopicArn": "${AlertTopic}",
                "Message": "CRITICAL: The SAGE Data Pipeline failed during the Glue ETL stage."
              },
              "End": true
            },
            "SuccessState": {
              "Type": "Succeed"
            }
          }
        }

Outputs:
  RawBucketName:
    Value: !Ref RawDataBucket
  AlertTopicArn:
    Value: !Ref AlertTopic